<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台股精選</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="台股精選">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b12;--s1:#0d1420;--s2:#111c2d;--border:#1a2840;--cyan:#00c8ff;--green:#00e5a0;--red:#ff4d6d;--gold:#f5c842;--purple:#a78bfa;--text:#d4e4f7;--muted:#4a6080;--mono:'Share Tech Mono',monospace;--sans:'Noto Sans TC',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.012) 2px,rgba(0,200,255,0.012) 4px);pointer-events:none;z-index:998}
.alert-banner{position:fixed;top:0;left:0;right:0;z-index:1000;padding:14px 16px;display:none;background:linear-gradient(135deg,rgba(0,229,160,0.97),rgba(0,200,255,0.97));backdrop-filter:blur(20px);box-shadow:0 4px 30px rgba(0,229,160,0.4);}
.alert-banner.show{display:flex;align-items:center;gap:12px;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.alert-icon{font-size:28px}.alert-text{flex:1}.alert-title{font-size:14px;font-weight:900;color:#000}.alert-sub{font-size:11px;color:rgba(0,0,0,0.7);margin-top:2px}.alert-close{font-size:20px;color:#000;cursor:pointer;padding:4px;opacity:.6}
.wrap{max-width:480px;margin:0 auto;padding:0 14px 110px;position:relative;z-index:1}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 0 14px;border-bottom:1px solid var(--border)}
.app-name{font-size:17px;font-weight:900;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 24px rgba(0,200,255,0.6)}
.app-ver{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.live-chip{display:flex;align-items:center;gap:5px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.25);border-radius:20px;padding:3px 10px;font-family:var(--mono);font-size:10px;color:var(--green)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.ts{font-family:var(--mono);font-size:9px;color:var(--muted)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding:14px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.fbadge{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:20px;letter-spacing:1px;border:1px solid;font-weight:700}
.fb-kd{color:#a78bfa;border-color:rgba(167,139,250,0.35);background:rgba(167,139,250,0.08)}
.fb-ma{color:var(--cyan);border-color:rgba(0,200,255,0.3);background:rgba(0,200,255,0.06)}
.fb-vol{color:var(--gold);border-color:rgba(245,200,66,0.3);background:rgba(245,200,66,0.07)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{flex:1;padding:10px 0;font-size:12px;font-weight:700;text-align:center;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:1px}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.sec-lbl{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-count{background:var(--cyan);color:#000;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:900}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-align:center}
.load-sub{font-size:10px;color:var(--muted);opacity:.6;text-align:center;line-height:1.6}
.err-box{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.3);border-radius:12px;padding:20px;text-align:center;margin:20px 0}
.err-title{color:var(--red);font-weight:700;margin-bottom:8px}
.err-msg{font-size:11px;color:var(--muted);line-height:1.6}
.retry-btn{margin-top:14px;padding:8px 20px;background:rgba(0,200,255,0.1);border:1px solid var(--cyan);border-radius:20px;color:var(--cyan);font-family:var(--mono);font-size:11px;cursor:pointer}
.mkt-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.mkt-cell{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.mkt-val{font-family:var(--mono);font-size:16px;font-weight:700}.mkt-lbl{font-size:9px;color:var(--muted);margin-top:3px}
.cards{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:15px;position:relative;overflow:hidden;animation:fadeUp .4s ease both;cursor:pointer;transition:transform .1s}
.card:active{transform:scale(0.985)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:linear-gradient(180deg,var(--green),rgba(0,229,160,0.3))}
.card.near-card::before{background:linear-gradient(180deg,var(--purple),rgba(167,139,250,0.3))}
.tap-hint{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right;margin-bottom:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.c-code{font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:2px}
.c-name{font-size:16px;font-weight:900;margin-top:1px}.c-cat{font-size:10px;color:var(--muted);margin-top:2px}
.c-price{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}.c-chg{font-family:var(--mono);font-size:11px;margin-top:3px}
.up{color:var(--green)}.dn{color:var(--red)}
.checks{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.chk{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:20px;border:1px solid}
.chk.ok{color:var(--green);border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.07)}
.chk.ng{color:var(--muted);border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.02)}
.kd-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.bar-label{font-family:var(--mono);font-size:9px;color:var(--muted);width:26px}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,0.05);border-radius:4px;position:relative;overflow:hidden}
.kd-zone{position:absolute;left:15%;width:10%;top:0;bottom:0;background:rgba(167,139,250,0.2);border-left:1px dashed rgba(167,139,250,0.5);border-right:1px dashed rgba(167,139,250,0.5)}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.fill-k{background:linear-gradient(90deg,#7c3aed,var(--purple))}.fill-d{background:linear-gradient(90deg,#0891b2,var(--cyan));opacity:.75}.fill-vol{background:linear-gradient(90deg,#b45309,var(--gold))}
.bar-val{font-family:var(--mono);font-size:11px;font-weight:700;min-width:36px;text-align:right}
.prob-blk{padding:10px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid var(--border);margin-top:6px}
.prob-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prob-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}.prob-num{font-family:var(--mono);font-size:16px;font-weight:700}
.prob-bar{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prob-fill{height:100%;border-radius:3px;overflow:hidden;position:relative}
.prob-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:sweep 2.5s infinite}
@keyframes sweep{to{left:100%}}
.ph{background:linear-gradient(90deg,#059669,var(--green))}.pm{background:linear-gradient(90deg,#b45309,var(--gold))}.pl{background:linear-gradient(90deg,#be123c,var(--red))}
.suggest{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px}.suggest span{color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;animation:fIn .25s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 16px 40px;border-top:1px solid var(--border);animation:sUp .3s ease;max-height:90vh;overflow-y:auto;}
@keyframes sUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.modal-sname{font-size:18px;font-weight:900}.modal-close{font-size:22px;color:var(--muted);cursor:pointer;padding:4px}
.modal-meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:16px}
.clbl{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:4px;letter-spacing:1px}
canvas.kd-chart{width:100%;height:180px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--border);display:block}
canvas.price-chart{width:100%;height:130px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--border);display:block;margin-bottom:10px}
.chart-legend{display:flex;gap:12px;margin:6px 0 14px}
.legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.mstat{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.mstat-val{font-family:var(--mono);font-size:15px;font-weight:700}.mstat-lbl{font-size:9px;color:var(--muted);margin-top:2px}
.remind-box{background:rgba(245,200,66,0.06);border:1px solid rgba(245,200,66,0.2);border-radius:12px;padding:14px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.remind-title{font-size:12px;font-weight:700;color:var(--gold)}.remind-sub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5}
.pot-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:10px;animation:fadeUp .4s ease both}
.pot-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pot-theme{font-size:13px;font-weight:700;color:var(--gold)}
.pot-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);color:var(--gold)}
.pot-reason{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.pot-stocks{display:flex;flex-wrap:wrap;gap:6px}
.pot-chip{display:flex;flex-direction:column;align-items:center;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;min-width:72px}
.pot-code{font-family:var(--mono);font-size:10px;color:var(--cyan)}.pot-sname{font-size:11px;font-weight:700;margin-top:1px}.pot-why{font-size:9px;color:var(--muted);margin-top:2px;text-align:center}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,11,18,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 22px;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni-icon{font-size:19px}.ni-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
.disc{font-size:10px;color:var(--muted);text-align:center;padding:10px 12px;border:1px solid var(--border);border-radius:8px;line-height:1.6;margin-top:8px}
.page{display:none}.page.active{display:block}
</style>
</head>
<body>
<div class="alert-banner" id="alertBanner">
  <div class="alert-icon">💹</div>
  <div class="alert-text">
    <div class="alert-title" id="alertTitle"></div>
    <div class="alert-sub" id="alertSub"></div>
  </div>
  <div class="alert-close" onclick="closeAlert()">✕</div>
</div>
<div class="wrap">
  <div class="hdr">
    <div><div class="app-name">台股精選</div><div class="app-ver">SMART SCREENER v3.0</div></div>
    <div class="hdr-right">
      <div class="live-chip"><div class="dot"></div><span id="liveLabel">載入中</span></div>
      <div class="ts" id="ts"></div>
    </div>
  </div>
  <div class="filter-row">
    <span class="fbadge fb-kd">KD：15–25 ↗</span>
    <span class="fbadge fb-ma">5日線：±2%</span>
    <span class="fbadge fb-vol">量增：>+10%</span>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('screen')">📊 條件篩選</div>
    <div class="tab" onclick="switchTab('potential')">🌏 潛力股</div>
  </div>
  <div class="page active" id="page-screen">
    <div id="screenContent">
      <div class="loading"><div class="spinner"></div><div class="load-text">正在掃描台股...</div><div class="load-sub">抓取 50 支股票資料<br>約需 40–60 秒</div></div>
    </div>
  </div>
  <div class="page" id="page-potential">
    <div class="sec-lbl">國際＋國內趨勢潛力股</div>
    <div id="potList"></div>
    <div class="disc">⚠️ 潛力股分析基於公開趨勢資訊，僅供參考，不構成投資建議。</div>
  </div>
</div>
<div class="modal-overlay" id="chartModal" onclick="closeModal(event)">
  <div class="modal-sheet">

    <div class="modal-title-row">

      <div class="modal-close" onclick="closeModalDirect()">✕</div>
    </div>
    <div class="clbl">收盤價走勢（黃線＝5日均線）</div>
    <canvas class="price-chart" id="priceChart"></canvas>
    <div class="clbl" style="margin-top:8px">KD 指標（近30個交易日）</div>
    <canvas class="kd-chart" id="kdChart"></canvas>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>K值</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>D值</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,0.4)"></div>20線區</div>
    </div>
    <div class="modal-stats" id="modalStats"></div>
  </div>
</div>
<div class="nav">
  <div class="ni" onclick="switchTab('screen')"><div class="ni-icon">📊</div><div class="ni-lbl" id="nl1" style="color:var(--cyan)">篩選</div></div>
  <div class="ni" onclick="switchTab('potential')"><div class="ni-icon">🌏</div><div class="ni-lbl" id="nl2">潛力</div></div>

  <div class="ni" onclick="loadData()"><div class="ni-icon">🔄</div><div class="ni-lbl">整理</div></div>
</div>

function updateTS(){const d=new Date();document.getElementById('ts').textContent=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function calcKDS(prices,period=9){let K=50,D=50;return prices.map((p,i)=>{const sl=prices.slice(Math.max(0,i-period+1),i+1);const h=Math.max(...sl.map(x=>x.max)),l=Math.min(...sl.map(x=>x.min));const r=h===l?50:(p.close-l)/(h-l)*100;K=K*(2/3)+r*(1/3);D=D*(2/3)+K*(1/3);return{K:Math.round(K*10)/10,D:Math.round(D*10)/10};});}
function calcMA5(prices){if(prices.length<5)return null;return prices.slice(-5).reduce((s,p)=>s+p.close,0)/5;}
function calcProb(K,D,md,vr){let s=50;if(K<20)s+=15;else if(K<25)s+=8;if(K>D)s+=12;if(Math.abs(md)<1)s+=10;else if(Math.abs(md)<2)s+=5;if(vr>30)s+=13;else if(vr>15)s+=8;else if(vr>10)s+=4;return Math.min(Math.max(s,30),92);}
async function fetchStock(code){
  const url='https://query1.finance.yahoo.com/v8/finance/chart/'+code+'.TW?interval=1d&range=3mo';
  const res=await fetch(PROXY+encodeURIComponent(url),{headers:{'x-requested-with':'XMLHttpRequest'}});
  if(!res.ok)throw new Error('Load failed');
  const data=await res.json();
  const chart=data?.chart?.result?.[0];if(!chart)return null;
  const ts=chart.timestamp,q=chart.indicators?.quote?.[0];if(!ts||!q)return null;
  const prices=[];
  for(let i=0;i<ts.length;i++){if(!q.close[i])continue;prices.push({close:parseFloat(q.close[i].toFixed(2)),max:parseFloat((q.high[i]||q.close[i]).toFixed(2)),min:parseFloat((q.low[i]||q.close[i]).toFixed(2)),volume:parseInt(q.volume[i]||0)});}
  return prices.length>=10?prices:null;
}
async function loadData(){
  document.getElementById('liveLabel').textContent='掃描中';
  document.getElementById('screenContent').innerHTML=`<div class="loading"><div class="spinner"></div><div class="load-text">正在掃描台股...</div><div class="load-sub">抓取 ${WATCHLIST.length} 支各產業龍頭<br>約需 3–5 分鐘，請稍候</div></div>`;
  try{
    const results=[];
    for(const stock of WATCHLIST){
      try{
        const prices=await fetchStock(stock.code);if(!prices)continue;
        allPrices[stock.code]=prices;
        const kdS=calcKDS(prices),lkd=kdS[kdS.length-1];
        const ma5=calcMA5(prices),lat=prices[prices.length-1],prev=prices[prices.length-2];
        const ma5Diff=ma5?(lat.close-ma5)/ma5*100:99;
        const volRatio=prev.volume>0?(lat.volume-prev.volume)/prev.volume*100:0;
        const chg=lat.close-prev.close,chgP=chg/prev.close*100,K=lkd.K,D=lkd.D;
        const kdOk=K>=COND.kdMin&&K<=COND.kdMax&&K>D,maOk=Math.abs(ma5Diff)<=COND.ma5Pct,volOk=volRatio>=COND.volIncrease;
        const pass=kdOk&&maOk&&volOk;
        results.push({...stock,pass,price:lat.close,chg,chgP,K,D,ma5:Math.round(ma5||0),ma5Diff,volRatio,prob:pass?calcProb(K,D,ma5Diff,volRatio):null,kdOk,maOk,volOk});
      }catch(e){console.warn(stock.code,'Error:',e.message);}
    }
    results.sort((a,b)=>a.pass!==b.pass?b.pass-a.pass:a.K-b.K);
    const passed=results.filter(r=>r.pass),near=results.filter(r=>!r.pass&&[r.kdOk,r.maOk,r.volOk].filter(Boolean).length>=2);
    renderScreen(results,passed,near);
    document.getElementById('liveLabel').textContent='即時資料';
    if(passed.length>0)checkAlert(passed);
  }catch(e){
    document.getElementById('screenContent').innerHTML=`<div class="err-box"><div class="err-title">⚠️ 資料載入失敗</div><div class="err-msg">${e.message}</div><div class="retry-btn" onclick="loadData()">重新載入</div></div>`;
    document.getElementById('liveLabel').textContent='失敗';
  }
}

  const miss=!s.kdOk?'KD未到低檔':!s.maOk?'偏離5日線':'量未放大';
  return `<div class="card ${sp?'':'near-card'}" style="animation-delay:${i*0.05}s" onclick="openChart('${s.code}','${s.name}','${s.cat}')">

        ${!sp?`<div style="font-family:var(--mono);font-size:9px;color:var(--red);margin-top:4px">✗ ${miss}</div>`:''}
      </div>
    </div>
    <div class="checks">
      <span class="chk ${s.kdOk?'ok':'ng'}">${s.kdOk?'✓':'✗'} KD向上 K=${s.K}</span>
      <span class="chk ${s.maOk?'ok':'ng'}">${s.maOk?'✓':'✗'} 5日線 ${s.ma5Diff>0?'+':''}${s.ma5Diff.toFixed(1)}%</span>

    ${sp?`<div class="prob-blk"><div class="prob-top"><span class="prob-lbl">掛單成功機率</span><span class="prob-num" style="color:${pclr}">${s.prob}%</span></div><div class="prob-bar"><div class="prob-fill ${pc}" style="width:${s.prob}%"></div></div><div class="suggest">建議掛買：<span>${buy}</span>　目標：<span>${sell}</span></div></div>`:''}

function drawPrice(prices){
  const cv=document.getElementById('priceChart'),dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr;cv.height=cv.offsetHeight*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const W=cv.offsetWidth,H=cv.offsetHeight,p={t:8,r:8,b:18,l:48};
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const cs=prices.map(x=>x.close),mn=Math.min(...cs)*0.998,mx=Math.max(...cs)*1.002;
  const sy=v=>(1-(v-mn)/(mx-mn))*ch+p.t,sx=i=>i/(prices.length-1)*cw+p.l;
  for(let i=0;i<=3;i++){const y=p.t+ch/3*i;ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText((mx-(mx-mn)/3*i).toFixed(0),p.l-3,y+3);}
  const ma5a=[];for(let i=0;i<prices.length;i++){if(i<4){ma5a.push(null);continue;}ma5a.push(prices.slice(i-4,i+1).reduce((s,x)=>s+x.close,0)/5);}
  ctx.strokeStyle='rgba(245,200,66,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ma5a.forEach((v,i)=>{if(!v)return;(!ma5a[i-1]||i===0)?ctx.moveTo(sx(i),sy(v)):ctx.lineTo(sx(i),sy(v));});ctx.stroke();ctx.setLineDash([]);
  const g=ctx.createLinearGradient(0,p.t,0,H);g.addColorStop(0,'rgba(0,200,255,0.25)');g.addColorStop(1,'rgba(0,200,255,0)');
  ctx.beginPath();prices.forEach((x,i)=>{i===0?ctx.moveTo(sx(i),sy(x.close)):ctx.lineTo(sx(i),sy(x.close));});ctx.lineTo(sx(prices.length-1),H-p.b);ctx.lineTo(sx(0),H-p.b);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='var(--cyan)';ctx.lineWidth=2;ctx.beginPath();prices.forEach((x,i)=>{i===0?ctx.moveTo(sx(i),sy(x.close)):ctx.lineTo(sx(i),sy(x.close));});ctx.stroke();
  ctx.fillStyle='var(--cyan)';ctx.beginPath();ctx.arc(sx(prices.length-1),sy(prices[prices.length-1].close),4,0,Math.PI*2);ctx.fill();
}
function drawKD(kd){
  const cv=document.getElementById('kdChart'),dpr=window.devicePixelRatio||1;
  cv.width=cv.offsetWidth*dpr;cv.height=cv.offsetHeight*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const W=cv.offsetWidth,H=cv.offsetHeight,p={t:8,r:8,b:18,l:28};
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const sy=v=>(1-v/100)*ch+p.t,sx=i=>i/(kd.length-1)*cw+p.l;
  ctx.fillStyle='rgba(255,77,109,0.05)';ctx.fillRect(p.l,sy(80),cw,sy(100)-sy(80));
  ctx.fillStyle='rgba(0,229,160,0.07)';ctx.fillRect(p.l,sy(20),cw,sy(0)-sy(20));
  [20,50,80].forEach(v=>{ctx.strokeStyle=v===50?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.setLineDash(v===50?[]:[3,3]);ctx.beginPath();ctx.moveTo(p.l,sy(v));ctx.lineTo(W-p.r,sy(v));ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(v,p.l-3,sy(v)+3);});
  ctx.strokeStyle='rgba(167,139,250,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(p.l,sy(20));ctx.lineTo(W-p.r,sy(20));ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle='rgba(0,200,255,0.75)';ctx.lineWidth=1.5;ctx.beginPath();kd.forEach((x,i)=>{i===0?ctx.moveTo(sx(i),sy(x.D)):ctx.lineTo(sx(i),sy(x.D));});ctx.stroke();
  ctx.strokeStyle='var(--purple)';ctx.lineWidth=2.5;ctx.beginPath();kd.forEach((x,i)=>{i===0?ctx.moveTo(sx(i),sy(x.K)):ctx.lineTo(sx(i),sy(x.K));});ctx.stroke();
  const last=kd[kd.length-1];
  ctx.fillStyle='var(--purple)';ctx.beginPath();ctx.arc(sx(kd.length-1),sy(last.K),4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='var(--cyan)';ctx.beginPath();ctx.arc(sx(kd.length-1),sy(last.D),4,0,Math.PI*2);ctx.fill();
  ctx.font='bold 10px monospace';ctx.textAlign='right';
  ctx.fillStyle='var(--purple)';ctx.fillText('K='+last.K.toFixed(1),W-p.r,sy(last.K)-6);
  ctx.fillStyle='var(--cyan)';ctx.fillText('D='+last.D.toFixed(1),W-p.r,sy(last.D)+12);
}

    <div class="mstat"><div class="mstat-val">${l.close.toFixed(1)}</div><div class="mstat-lbl">收盤價</div></div>`;

function switchTab(t){
