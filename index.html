<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台股精選篩選器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070b12;--s1:#0d1420;--s2:#111c2d;--border:#1a2840;
  --cyan:#00c8ff;--green:#00e5a0;--red:#ff4d6d;--gold:#f5c842;
  --purple:#a78bfa;--text:#d4e4f7;--muted:#4a6080;
  --mono:'Share Tech Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.012) 2px,rgba(0,200,255,0.012) 4px);
  pointer-events:none;z-index:999}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(0,200,255,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:0}
.wrap{max-width:480px;margin:0 auto;padding:0 14px 110px;position:relative;z-index:1}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:18px 0 14px;border-bottom:1px solid var(--border)}
.app-name{font-size:17px;font-weight:900;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 24px rgba(0,200,255,0.6)}
.app-ver{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.live-chip{display:flex;align-items:center;gap:5px;background:rgba(0,229,160,0.08);
  border:1px solid rgba(0,229,160,0.25);border-radius:20px;padding:3px 10px;
  font-family:var(--mono);font-size:10px;color:var(--green)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.ts{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}

/* FILTER BADGES */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding:14px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.fbadge{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:20px;letter-spacing:1px;border:1px solid;font-weight:700}
.fb-kd{color:#a78bfa;border-color:rgba(167,139,250,0.35);background:rgba(167,139,250,0.08)}
.fb-ma{color:var(--cyan);border-color:rgba(0,200,255,0.3);background:rgba(0,200,255,0.06)}
.fb-vol{color:var(--gold);border-color:rgba(245,200,66,0.3);background:rgba(245,200,66,0.07)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{flex:1;padding:10px 0;font-size:12px;font-weight:700;text-align:center;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:1px}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* SECTION LABEL */
.sec-lbl{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--muted);
  text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-count{background:var(--cyan);color:#000;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:900}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-align:center}
.load-sub{font-size:10px;color:var(--muted);opacity:.6;text-align:center;line-height:1.6}

/* ERROR */
.err-box{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.3);
  border-radius:12px;padding:20px;text-align:center;margin:20px 0}
.err-title{color:var(--red);font-weight:700;margin-bottom:8px}
.err-msg{font-size:11px;color:var(--muted);line-height:1.6}
.retry-btn{margin-top:14px;padding:8px 20px;background:rgba(0,200,255,0.1);
  border:1px solid var(--cyan);border-radius:20px;color:var(--cyan);
  font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:1px}

/* MARKET BAR */
.mkt-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.mkt-cell{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.mkt-val{font-family:var(--mono);font-size:16px;font-weight:700}
.mkt-lbl{font-size:9px;color:var(--muted);margin-top:3px;letter-spacing:.5px}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.card{background:var(--s2);border:1px solid var(--border);border-radius:14px;
  padding:15px;position:relative;overflow:hidden;animation:fadeUp .4s ease both;cursor:pointer}
.card:active{transform:scale(0.985)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;
  background:linear-gradient(180deg,var(--green),rgba(0,229,160,0.3))}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.c-code{font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:2px}
.c-name{font-size:16px;font-weight:900;margin-top:1px}
.c-cat{font-size:10px;color:var(--muted);margin-top:2px}
.c-price{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1}
.c-chg{font-family:var(--mono);font-size:11px;margin-top:3px}
.up{color:var(--green)}.dn{color:var(--red)}

/* CHECKS */
.checks{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.chk{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:20px;border:1px solid;letter-spacing:.5px}
.chk.ok{color:var(--green);border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.07)}
.chk.ng{color:var(--muted);border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.02)}

/* KD / MA / VOL BARS */
.kd-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.bar-label{font-family:var(--mono);font-size:9px;color:var(--muted);width:26px}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,0.05);border-radius:4px;position:relative;overflow:hidden}
.kd-zone{position:absolute;left:15%;width:10%;top:0;bottom:0;background:rgba(167,139,250,0.2);border-left:1px dashed rgba(167,139,250,0.5);border-right:1px dashed rgba(167,139,250,0.5)}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.fill-k{background:linear-gradient(90deg,#7c3aed,var(--purple))}
.fill-d{background:linear-gradient(90deg,#0891b2,var(--cyan));opacity:.75}
.fill-vol{background:linear-gradient(90deg,#b45309,var(--gold))}
.bar-val{font-family:var(--mono);font-size:11px;font-weight:700;min-width:36px;text-align:right}

/* PROBABILITY */
.prob-blk{padding:10px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid var(--border);margin-top:2px}
.prob-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prob-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
.prob-num{font-family:var(--mono);font-size:16px;font-weight:700}
.prob-bar{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prob-fill{height:100%;border-radius:3px;overflow:hidden;position:relative}
.prob-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:sweep 2.5s infinite}
@keyframes sweep{to{left:100%}}
.ph{background:linear-gradient(90deg,#059669,var(--green))}
.pm{background:linear-gradient(90deg,#b45309,var(--gold))}
.pl{background:linear-gradient(90deg,#be123c,var(--red))}
.suggest{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px}
.suggest span{color:var(--text)}

/* POTENTIAL */
.pot-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:10px;animation:fadeUp .4s ease both}
.pot-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pot-theme{font-size:13px;font-weight:700;color:var(--gold)}
.pot-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;
  background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.3);color:var(--gold);letter-spacing:1px}
.pot-reason{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.pot-stocks{display:flex;flex-wrap:wrap;gap:6px}
.pot-chip{display:flex;flex-direction:column;align-items:center;
  background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;min-width:72px}
.pot-code{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:1px}
.pot-sname{font-size:11px;font-weight:700;margin-top:1px}
.pot-why{font-size:9px;color:var(--muted);margin-top:2px;text-align:center}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,11,18,.96);
  backdrop-filter:blur(20px);border-top:1px solid var(--border);
  display:flex;padding:10px 0 22px;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ni-icon{font-size:19px}
.ni-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}

.disc{font-size:10px;color:var(--muted);text-align:center;padding:10px 12px;
  border:1px solid var(--border);border-radius:8px;line-height:1.6;margin-top:8px}

.page{display:none}.page.active{display:block}

/* last-update */
.last-upd{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right;margin-bottom:10px;letter-spacing:1px}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="wrap">

  <div class="hdr">
    <div>
      <div class="app-name">台股精選</div>
      <div class="app-ver">SMART SCREENER v2.1</div>
    </div>
    <div class="hdr-right">
      <div class="live-chip"><div class="dot"></div><span id="liveLabel">載入中</span></div>
      <div class="ts" id="ts"></div>
    </div>
  </div>

  <div class="filter-row">
    <span class="fbadge fb-kd">KD：15–25 ↗</span>
    <span class="fbadge fb-ma">5日線：±2%</span>
    <span class="fbadge fb-vol">量增：>+10%</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('screen')">📊 條件篩選</div>
    <div class="tab" onclick="switchTab('potential')">🌏 潛力股</div>
  </div>

  <!-- PAGE: SCREENER -->
  <div class="page active" id="page-screen">
    <div id="screenContent">
      <div class="loading">
        <div class="spinner"></div>
        <div class="load-text">正在抓取台股資料...</div>
        <div class="load-sub">從 FinMind 取得即時數據<br>約需 10–20 秒</div>
      </div>
    </div>
  </div>

  <!-- PAGE: POTENTIAL -->
  <div class="page" id="page-potential">
    <div class="sec-lbl">國際＋國內趨勢潛力股</div>
    <div id="potList"></div>
    <div class="disc">⚠️ 潛力股分析基於公開趨勢資訊，僅供參考，不構成投資建議。</div>
  </div>

</div>

<div class="nav">
  <div class="ni" onclick="switchTab('screen')">
    <div class="ni-icon">📊</div><div class="ni-lbl" id="nl1" style="color:var(--cyan)">篩選</div>
  </div>
  <div class="ni" onclick="switchTab('potential')">
    <div class="ni-icon">🌏</div><div class="ni-lbl" id="nl2">潛力</div>
  </div>
  <div class="ni">
    <div class="ni-icon">⭐</div><div class="ni-lbl">自選</div>
  </div>
  <div class="ni" onclick="loadData()">
    <div class="ni-icon">🔄</div><div class="ni-lbl">重新整理</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 設定區
// ═══════════════════════════════════════
const TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJkYXRlIjoiMjAyNi0wMy0zMSAxMzo0ODoxOCIsInVzZXJfaWQiOiJZdm9ubmUiLCJlbWFpbCI6ImxvdmUxMjAzQGdtYWlsLmNvbSIsImlwIjoiMTE2LjU5LjEwNC43OCJ9.hVy048E4sgoU6D83QlAhi_iw-6G8gIw4QUO9Sl3pgUM';
const API   = 'https://api.finmindtrade.com/api/v4/data';

// 監控股票清單（可自行增減）
const WATCHLIST = [
  {code:'2330',name:'台積電',cat:'半導體'},
  {code:'2317',name:'鴻海',cat:'電子製造'},
  {code:'2382',name:'廣達',cat:'AI伺服器'},
  {code:'2308',name:'台達電',cat:'電源管理'},
  {code:'2454',name:'聯發科',cat:'IC設計'},
  {code:'6669',name:'緯穎',cat:'雲端伺服器'},
  {code:'3008',name:'大立光',cat:'光學鏡頭'},
  {code:'3034',name:'聯詠',cat:'IC設計'},
  {code:'2303',name:'聯電',cat:'晶圓代工'},
  {code:'2412',name:'中華電',cat:'電信'},
  {code:'1605',name:'華新',cat:'電力設備'},
  {code:'2379',name:'瑞昱',cat:'IC設計'},
];

// 篩選條件
const COND = { kdMin:15, kdMax:25, ma5Pct:2, volIncrease:10 };

// ═══════════════════════════════════════
// 工具函式
// ═══════════════════════════════════════
function updateTS(){
  const d=new Date();
  document.getElementById('ts').textContent=
    `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} `+
    `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// 取得最近N個交易日（往前推，跳過週末）
function getDateRange(days=40){
  const dates=[];
  const d=new Date();
  while(dates.length<days){
    d.setDate(d.getDate()-1);
    if(d.getDay()!==0&&d.getDay()!==6)
      dates.push(d.toISOString().slice(0,10));
  }
  return {start:dates[dates.length-1], end:dates[0]};
}

// 計算 KD（隨機指標）
function calcKD(prices, period=9){
  if(prices.length < period) return {K:50,D:50};
  const recent = prices.slice(-period);
  const highs  = recent.map(p=>p.max);
  const lows   = recent.map(p=>p.min);
  const hh = Math.max(...highs);
  const ll = Math.min(...lows);
  const close = prices[prices.length-1].close;
  const rsv = hh===ll ? 50 : (close-ll)/(hh-ll)*100;

  let K=50, D=50;
  for(let i=0;i<prices.length;i++){
    const slice=prices.slice(Math.max(0,i-period+1),i+1);
    const h=Math.max(...slice.map(p=>p.max));
    const l=Math.min(...slice.map(p=>p.min));
    const r=h===l?50:(prices[i].close-l)/(h-l)*100;
    K=K*(2/3)+r*(1/3);
    D=D*(2/3)+K*(1/3);
  }
  return {K:Math.round(K), D:Math.round(D)};
}

// 計算5日均線
function calcMA5(prices){
  if(prices.length<5) return null;
  const last5 = prices.slice(-5);
  return last5.reduce((s,p)=>s+p.close,0)/5;
}

// 計算掛單成功機率
function calcProb(kd, ma5Diff, volRatio){
  let score = 50;
  // KD 越低越好（低檔反彈）
  if(kd.K<20) score+=15;
  else if(kd.K<25) score+=8;
  // K > D 代表向上交叉
  if(kd.K>kd.D) score+=12;
  // 貼近5日線
  if(Math.abs(ma5Diff)<1) score+=10;
  else if(Math.abs(ma5Diff)<2) score+=5;
  // 量增
  if(volRatio>30) score+=13;
  else if(volRatio>15) score+=8;
  else if(volRatio>10) score+=4;
  return Math.min(Math.max(score,30),92);
}

// ═══════════════════════════════════════
// API 呼叫
// ═══════════════════════════════════════
async function fetchStock(code){
  const {start,end} = getDateRange(40);
  const url=`${API}?dataset=TaiwanStockPrice&data_id=${code}&start_date=${start}&end_date=${end}&token=${TOKEN}`;
  const res = await fetch(url);
  const json = await res.json();
  if(!json.data||json.data.length<10) return null;
  return json.data.map(d=>({
    date:  d.date,
    close: parseFloat(d.close),
    max:   parseFloat(d.max),
    min:   parseFloat(d.min),
    volume:parseInt(d.Trading_Volume||d.volume||0),
  }));
}

// ═══════════════════════════════════════
// 主流程
// ═══════════════════════════════════════
async function loadData(){
  document.getElementById('liveLabel').textContent='更新中';
  document.getElementById('screenContent').innerHTML=`
    <div class="loading">
      <div class="spinner"></div>
      <div class="load-text">正在抓取台股資料...</div>
      <div class="load-sub">從 FinMind 取得 ${WATCHLIST.length} 支股票數據<br>約需 15–30 秒，請稍候</div>
    </div>`;

  try {
    const results=[];

    for(const stock of WATCHLIST){
      try{
        const prices = await fetchStock(stock.code);
        if(!prices||prices.length<10) continue;

        const kd       = calcKD(prices);
        const ma5      = calcMA5(prices);
        const latest   = prices[prices.length-1];
        const prev     = prices[prices.length-2];
        const ma5Diff  = ma5 ? (latest.close-ma5)/ma5*100 : 99;
        const volRatio = prev.volume>0 ? (latest.volume-prev.volume)/prev.volume*100 : 0;
        const chg      = latest.close - prev.close;
        const chgP     = (chg/prev.close*100);

        const kdOk  = kd.K>=COND.kdMin && kd.K<=COND.kdMax && kd.K>kd.D;
        const maOk  = Math.abs(ma5Diff) <= COND.ma5Pct;
        const volOk = volRatio >= COND.volIncrease;
        const pass  = kdOk && maOk && volOk;

        results.push({
          ...stock, pass,
          price:  latest.close,
          chg, chgP,
          K: kd.K, D: kd.D,
          ma5: Math.round(ma5||0),
          ma5Diff, volRatio,
          volume: latest.volume,
          prob: pass ? calcProb(kd, ma5Diff, volRatio) : null,
          kdOk, maOk, volOk,
        });
      } catch(e){ console.warn(stock.code, e); }
    }

    // 排序：全部通過的優先，再依 K 值升序
    results.sort((a,b)=>{
      if(a.pass!==b.pass) return b.pass-a.pass;
      return a.K-b.K;
    });

    const passed = results.filter(r=>r.pass);
    renderScreen(results, passed.length);
    document.getElementById('liveLabel').textContent='即時資料';

  } catch(e){
    document.getElementById('screenContent').innerHTML=`
      <div class="err-box">
        <div class="err-title">⚠️ 資料載入失敗</div>
        <div class="err-msg">可能原因：網路問題或 API 限制<br>錯誤：${e.message}</div>
        <div class="retry-btn" onclick="loadData()">重新載入</div>
      </div>`;
    document.getElementById('liveLabel').textContent='載入失敗';
  }
}

// ═══════════════════════════════════════
// 渲染篩選結果
// ═══════════════════════════════════════
function renderScreen(results, passCount){
  const now = new Date();
  const upd = `更新：${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  let html=`
    <div class="mkt-bar">
      <div class="mkt-cell">
        <div class="mkt-val" style="color:var(--cyan)">${results.length}</div>
        <div class="mkt-lbl">掃描股數</div>
      </div>
      <div class="mkt-cell">
        <div class="mkt-val" style="color:var(--gold)">${passCount}</div>
        <div class="mkt-lbl">符合條件</div>
      </div>
      <div class="mkt-cell">
        <div class="mkt-val" style="color:var(--muted);font-size:11px">${upd}</div>
        <div class="mkt-lbl">更新時間</div>
      </div>
    </div>
    <div class="sec-lbl">篩選結果 <span class="sec-count">${passCount}</span></div>
    <div class="cards">`;

  results.forEach((s,i)=>{
    const isUp   = s.chg>=0;
    const sign   = isUp?'▲':'▼';
    const cc     = isUp?'up':'dn';
    const kw     = Math.min(s.K,100);
    const dw     = Math.min(s.D,100);
    const volW   = Math.min(Math.max(s.volRatio/60*100,0),100);
    const probCls= s.pass ? (s.prob>=75?'ph':s.prob>=60?'pm':'pl') : '';
    const probClr= s.pass ? (s.prob>=75?'var(--green)':s.prob>=60?'var(--gold)':'var(--red)') : 'var(--muted)';
    const buyZone= s.price ? `${(s.price*0.99).toFixed(1)} – ${s.price.toFixed(1)}` : '-';
    const sellZone=s.price ? `${(s.price*1.04).toFixed(1)} – ${(s.price*1.06).toFixed(1)}` : '-';

    html+=`
    <div class="card" style="animation-delay:${i*0.05}s;${!s.pass?'opacity:.55':''}">
      <div class="card-top">
        <div>
          <div class="c-code">${s.code}</div>
          <div class="c-name">${s.name}</div>
          <div class="c-cat">${s.cat}</div>
        </div>
        <div style="text-align:right">
          <div class="c-price ${cc}">$${s.price.toLocaleString()}</div>
          <div class="c-chg ${cc}">${sign} ${Math.abs(s.chg).toFixed(1)} (${isUp?'+':''}${s.chgP.toFixed(2)}%)</div>
        </div>
      </div>
      <div class="checks">
        <span class="chk ${s.kdOk?'ok':'ng'}">${s.kdOk?'✓':'✗'} KD低檔向上</span>
        <span class="chk ${s.maOk?'ok':'ng'}">${s.maOk?'✓':'✗'} 貼近5日線</span>
        <span class="chk ${s.volOk?'ok':'ng'}">${s.volOk?'✓':'✗'} 量增+${s.volRatio.toFixed(0)}%</span>
      </div>
      <div class="kd-row">
        <div class="bar-label" style="color:var(--purple)">K</div>
        <div class="bar-track">
          <div class="kd-zone"></div>
          <div class="bar-fill fill-k" style="width:${kw}%"></div>
        </div>
        <div class="bar-val" style="color:var(--purple)">${s.K}</div>
      </div>
      <div class="kd-row">
        <div class="bar-label" style="color:var(--cyan)">D</div>
        <div class="bar-track">
          <div class="bar-fill fill-d" style="width:${dw}%"></div>
        </div>
        <div class="bar-val" style="color:var(--cyan)">${s.D}</div>
      </div>
      <div class="kd-row">
        <div class="bar-label" style="color:var(--gold)">量</div>
        <div class="bar-track">
          <div class="bar-fill fill-vol" style="width:${volW}%"></div>
        </div>
        <div class="bar-val" style="color:var(--gold)">${s.volRatio>0?'+':''}${s.volRatio.toFixed(0)}%</div>
      </div>
      ${s.pass?`
      <div class="prob-blk">
        <div class="prob-top">
          <span class="prob-lbl">掛單成功機率</span>
          <span class="prob-num" style="color:${probClr}">${s.prob}%</span>
        </div>
        <div class="prob-bar"><div class="prob-fill ${probCls}" style="width:${s.prob}%"></div></div>
        <div class="suggest">建議掛買：<span>${buyZone}</span>　目標：<span>${sellZone}</span></div>
      </div>`:''}
    </div>`;
  });

  html+=`</div><div class="disc">⚠️ 資料來源：FinMind 台股 API。KD／均線為統計估算，不構成投資建議，請自行判斷風險。</div>`;
  document.getElementById('screenContent').innerHTML=html;
}

// Tab 切換

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>
    el.classList.toggle('active',(i===0&&t==='screen')||(i===1&&t==='potential')));
  document.getElementById('page-screen').classList.toggle('active',t==='screen');
  document.getElementById('page-potential').classList.toggle('active',t==='potential');
  document.getElementById('nl1').style.color=t==='screen'?'var(--cyan)':'';
  document.getElementById('nl2').style.color=t==='potential'?'var(--cyan)':'';
}
